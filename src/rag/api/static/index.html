<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>RAG Playbook</title>
    <style>
      :root {
        --bg: #f6f7f9;
        --card: #ffffff;
        --ink: #1a1d21;
        --muted: #6b7280;
        --line: #e4e7eb;
        --accent: #2b6cb0;
        --accent-ink: #ffffff;
        --warn: #b42318;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #16181c;
          --card: #1f2227;
          --ink: #e8eaed;
          --muted: #9aa1ab;
          --line: #313641;
          --accent: #4c8bd6;
          --warn: #f0806c;
        }
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font: 15px/1.55 system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        background: var(--bg);
        color: var(--ink);
      }
      main { max-width: 820px; margin: 0 auto; padding: 2rem 1rem 4rem; }
      h1 { font-size: 1.5rem; margin: 0 0 0.25rem; }
      .lede { color: var(--muted); margin: 0 0 1.5rem; }
      form {
        display: flex; gap: 0.5rem; flex-wrap: wrap; align-items: stretch;
        margin-bottom: 1.25rem;
      }
      #question { flex: 1 1 20rem; }
      input, button {
        font: inherit; padding: 0.6rem 0.75rem; border-radius: 8px;
        border: 1px solid var(--line); background: var(--card); color: var(--ink);
      }
      #top_k { width: 5.5rem; }
      button {
        background: var(--accent); color: var(--accent-ink); border-color: transparent;
        cursor: pointer; font-weight: 600;
      }
      button:disabled { opacity: 0.55; cursor: default; }
      .card {
        background: var(--card); border: 1px solid var(--line); border-radius: 12px;
        padding: 1rem 1.15rem; margin-bottom: 1.15rem;
      }
      .card h2 { font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.04em;
        color: var(--muted); margin: 0 0 0.6rem; }
      #answer { white-space: pre-wrap; }
      .status { color: var(--muted); font-size: 0.9rem; }
      .error { color: var(--warn); }
      ol.sources { margin: 0; padding-left: 1.2rem; }
      ol.sources li { margin: 0.15rem 0; }
      ol.sources a { color: var(--accent); }
      .notice { color: var(--muted); font-size: 0.82rem; margin-top: 0.7rem; }
      .stats { color: var(--muted); font-size: 0.82rem; margin-top: 0.6rem; }
      table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
      th, td { text-align: left; padding: 0.45rem 0.5rem; border-bottom: 1px solid var(--line);
        vertical-align: top; }
      th { color: var(--muted); font-weight: 600; }
      td.dist { font-variant-numeric: tabular-nums; white-space: nowrap; color: var(--muted); }
      td.text { color: var(--ink); }
      .hidden { display: none; }
    </style>
  </head>
  <body>
    <main>
      <h1>RAG Playbook</h1>
      <p class="lede">
        Ask a question about a Premier League club. Answers come only from retrieved English
        Wikipedia excerpts — the retrieval view below shows exactly what was found.
      </p>

      <form id="ask-form">
        <input
          id="question"
          type="text"
          placeholder="e.g. Which stadium does Arsenal play at?"
          autocomplete="off"
          autofocus
        />
        <input id="top_k" type="number" min="1" max="50" value="5" title="how many chunks to retrieve" />
        <button id="submit" type="submit">Ask</button>
      </form>

      <p id="status" class="status"></p>

      <section id="answer-card" class="card hidden">
        <h2>Answer</h2>
        <div id="answer"></div>
        <ol id="sources" class="sources"></ol>
        <p id="notice" class="notice"></p>
        <p id="stats" class="stats"></p>
      </section>

      <section id="retrieval-card" class="card hidden">
        <h2>Retrieved chunks (lower distance = closer match)</h2>
        <div style="overflow-x: auto">
          <table>
            <thead>
              <tr><th>#</th><th>Distance</th><th>Source</th><th>Excerpt</th></tr>
            </thead>
            <tbody id="hits"></tbody>
          </table>
        </div>
      </section>
    </main>

    <script>
      const form = document.getElementById("ask-form");
      const questionEl = document.getElementById("question");
      const topKEl = document.getElementById("top_k");
      const submitEl = document.getElementById("submit");
      const statusEl = document.getElementById("status");
      const answerCard = document.getElementById("answer-card");
      const answerEl = document.getElementById("answer");
      const sourcesEl = document.getElementById("sources");
      const noticeEl = document.getElementById("notice");
      const statsEl = document.getElementById("stats");
      const retrievalCard = document.getElementById("retrieval-card");
      const hitsEl = document.getElementById("hits");

      async function postJSON(path, body) {
        const res = await fetch(path, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(body),
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) {
          const d = data.detail;
          let msg = `HTTP ${res.status}`;
          if (typeof d === "string") msg = d;
          else if (Array.isArray(d)) msg = d.map((e) => e.msg).join("; ");
          throw new Error(msg);
        }
        return data;
      }

      function setStatus(text, isError = false) {
        statusEl.textContent = text;
        statusEl.classList.toggle("error", isError);
      }

      function renderRetrieval(hits) {
        hitsEl.replaceChildren();
        for (const h of hits) {
          const tr = document.createElement("tr");
          const cells = [
            [h.n, ""],
            [h.distance.toFixed(4), "dist"],
            [h.citation, ""],
            [h.text, "text"],
          ];
          for (const [value, cls] of cells) {
            const td = document.createElement("td");
            td.textContent = value;
            if (cls) td.className = cls;
            tr.appendChild(td);
          }
          hitsEl.appendChild(tr);
        }
        retrievalCard.classList.remove("hidden");
      }

      function renderAnswer(ask) {
        answerEl.textContent = ask.answer;
        sourcesEl.replaceChildren();
        for (const s of ask.sources) {
          const li = document.createElement("li");
          const a = document.createElement("a");
          a.href = s.source_url;
          a.target = "_blank";
          a.rel = "noopener";
          a.textContent = s.citation;
          li.append(a);
          sourcesEl.appendChild(li);
        }
        noticeEl.textContent = ask.licence;
        const st = ask.stats;
        statsEl.textContent =
          `${st.prompt_tokens} prompt + ${st.answer_tokens} answer tokens · ` +
          `prefill ${st.prompt_eval_seconds.toFixed(1)}s · decode ${st.eval_seconds.toFixed(1)}s · ` +
          `total ${st.total_seconds.toFixed(1)}s`;
        answerCard.classList.remove("hidden");
      }

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        const question = questionEl.value.trim();
        if (!question) return;
        const top_k = Math.min(50, Math.max(1, parseInt(topKEl.value, 10) || 5));
        const body = { question, top_k };

        submitEl.disabled = true;
        answerCard.classList.add("hidden");
        retrievalCard.classList.add("hidden");

        try {
          // Retrieval is fast — show what was found first, then wait on generation.
          setStatus("Retrieving…");
          renderRetrieval((await postJSON("/search", body)).hits);
          setStatus("Generating the answer… (CPU — this can take about a minute)");
          renderAnswer(await postJSON("/ask", body));
          setStatus("");
        } catch (err) {
          setStatus(err.message, true);
        } finally {
          submitEl.disabled = false;
        }
      });
    </script>
  </body>
</html>
