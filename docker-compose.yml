# Local dev stack — currently just the vector database.
# Copy .env.example to .env first.

# Cap container logs — the json-file driver grows unbounded otherwise and can
# fill the server disk over time.
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "5m"
    max-file: "3"

services:
  postgres:
    image: pgvector/pgvector:pg17
    restart: unless-stopped
    logging: *default-logging
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
