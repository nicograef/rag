# Local dev stack — the vector database and the LLM runtime.
# Copy .env.example to .env first.

services:
  postgres:
    image: pgvector/pgvector:pg17
    restart: unless-stopped
    # Hard memory cap so the container cannot thrash the 8 GB design floor. The MVP
    # corpus (a few hundred chunks) needs far less; this only bounds runaway usage.
    mem_limit: 1g
    # Cap container logs — the json-file driver grows unbounded otherwise and can
    # fill the server disk over time.
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10

  ollama:
    image: ollama/ollama:0.32.1
    restart: unless-stopped
    # Hard memory cap for the 8 GB floor: granite4:micro (~2.1 GB, Q4_K_M) plus its
    # num_ctx 4096 KV cache fit comfortably; this bounds it well below the host limit.
    mem_limit: 5g
    # Same log cap as postgres — the json-file driver grows unbounded otherwise.
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"
    ports:
      - "11434:11434"
    volumes:
      - ollama:/root/.ollama
    healthcheck:
      # The image ships no curl/wget; the ollama CLI round-trips through the server.
      test: ["CMD", "ollama", "ls"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
  ollama:
