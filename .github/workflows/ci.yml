name: CI

on:
  push:
    branches: [main]
  pull_request:

# CI only reads the repo; no job writes to it.
permissions:
  contents: read

# Cancel superseded runs on rapid pushes to the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Verify lockfile matches pyproject.toml
        run: uv lock --check

      - name: Install dependencies
        run: make setup

      - name: Lint + types + tests
        run: make check
