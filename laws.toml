# Laws in the corpus, keyed by their gesetze-im-internet.de slug.
# The fetch stage downloads https://www.gesetze-im-internet.de/<slug>/xml.zip
# for every entry; the value is a human-readable label used in log output.
# Adding a law to the corpus means adding one line here.

[laws]
ao_1977 = "Abgabenordnung (AO)"
ustg_1980 = "Umsatzsteuergesetz (UStG)"
kassensichv = "Kassensicherungsverordnung (KassenSichV)"
gg = "Grundgesetz (GG)"
